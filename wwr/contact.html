<html lang="en">

<head>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description" content="Contact Z-Dry Rafting for inquiries, reservations, and customer support. Our">
    <meta charset="UTF-8">
    <meta name="author" content="Rodrigo">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Dry Rafting - Contact Us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header> 
        <img src="images/z-dryoarlogo.png" alt="Company Logo">
        <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About us</a></li>
            <li><a href="trip.html">Trips</a></li>
            <li><a href="contact.html">Contact us</a></li>
        </ul>
        </nav>
    </header>
    <main class="main-contact">
       <div class="contact">
        <h1>Contact Dry-Oar Rafting</h1>
        <article>
            <p> 123 Main Street, Anytown, USA</p>
            <p>Phone: (123) 456-7890</p>
            <p>Email: info@dryrafting.com</p>
        </article>
        </div>
        <div class="message-map">
        <section class="form">
            <h2>Send Us a Message</h2>
            <form>
                <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group radio-group">
                <label>
                    <input type="radio" id="general" name="inquiry" value="general"> General Inquiry
                </label>
                <label>
                    <input type="radio" id="reservation" name="inquiry" value="reservation"> Reservation Question
                </label>
                <label>
                    <input type="radio" id="suggestion" name="inquiry" value="suggestion"> Website Suggestion
                </label>
                </div>
                <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" id="checkbox" name="subscribe"> Subscribe to our newsletter
                </label>
                </div>
                <button type="submit">Send Message</button>
            </form> 
        </section>
        <section class="map">
            <h2>Find Us Here</h2>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d43223.76084456829!2d-77.06872348225015!3d-12.112717105164446!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105c9a5a85bbe85%3A0x4fe94b5f0d384759!2sClass%20Adventure%20Travel%20%2F%20Encounter%20Latin%20America!5e0!3m2!1ses!2spe!4v1780883915119!5m2!1ses!2spe" width="400" height="300" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </div>
        <section class="employees">
            <h2>We are here to serve you</h2>
            <figure>
                <img src="images/rafting-person-one.jpg" alt="employee one">
                <figcaption>Karen<br><span class="title">River Guide</span></figcaption>
            </figure>
            <figure>
                <img src="images/rafting-person-two.jpg" alt="employee two">
                <figcaption>Agatha<br><span class="title">Lead Instructor</span></figcaption>
            </figure>
            <figure>
                <img src="images/rafting-person-three.jpg" alt="employee three">
                <figcaption>Sarah<br><span class="title">Equipment Manager</span></figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>© 2026 Z-Dry Rafting. All rights reserved.</p>
    <nav class="socialmedia">
    <a href="https://facebook.com">
        <img src="images/facebook.png" alt="Facebook Icon" width="35">
    </a>
    <a href="https://linkedin.com">
        <img src="images/linkedin.png" alt="LinkedIn Icon" width="35">
    </a>
    <a href="https://instagram.com">
        <img src="images/instagram.png" alt="Instagram Icon" width="35">
    </a>
    </nav>
    </footer>
</body>
</html>
